services:
  - type: web
    name: adchemy-client-os
    runtime: node
    buildCommand: NODE_OPTIONS='--max-old-space-size=4096' pnpm install && NODE_OPTIONS='--max-old-space-size=4096' pnpm build
    startCommand: pnpm start
    healthCheckPath: /api/health
    disk:
      name: adchemy-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DB_KEY
        generateValue: true
      - key: DB_PATH
        value: /data/adchemy.db
      - key: MCP_ADMIN_TOKEN
        sync: false
      - key: GMAIL_FROM_NAME
        sync: false
